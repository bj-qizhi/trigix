name: Publish Helm Chart

# Packages charts/trigix and pushes it to GitHub Container Registry as an OCI
# artifact when a tag like `chart-v0.2.0` is pushed (or run manually).
#
# Uses the Actions GITHUB_TOKEN (no PAT needed). One-time setup so the token
# can push to the existing package:
#   GitHub > Packages > charts/trigix > Package settings > Manage Actions access
#   > add the `bj-qizhi/trigix` repository with the "Write" role.
# A brand-new package also starts private; flip it to Public once (the org must
# allow public packages).

on:
  push:
    tags: ["chart-v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release on tag
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the default branch to commit the README bump

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Lint and render
        run: |
          helm lint charts/trigix
          helm template t charts/trigix > /dev/null

      - name: Check the tag matches Chart.yaml version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag_version="${GITHUB_REF_NAME#chart-v}"
          chart_version="$(grep '^version:' charts/trigix/Chart.yaml | awk '{print $2}')"
          echo "tag=$tag_version chart=$chart_version"
          if [ "$tag_version" != "$chart_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match Chart.yaml version $chart_version"
            exit 1
          fi

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push
        run: |
          helm package charts/trigix -d dist
          helm push dist/trigix-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#chart-v}"
          owner="${{ github.repository_owner }}"
          printf 'Helm chart `trigix` **%s** (deploys app 1.1.0).\n\nInstall:\n```bash\nhelm install trigix oci://ghcr.io/%s/charts/trigix --version %s --namespace trigix --create-namespace\n```\n' \
            "$version" "$owner" "$version" > /tmp/notes.md
          gh release create "$GITHUB_REF_NAME" dist/trigix-*.tgz \
            --title "Helm chart v${version}" --notes-file /tmp/notes.md \
            || gh release upload "$GITHUB_REF_NAME" dist/trigix-*.tgz --clobber

      - name: Bump README install version on the default branch
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="${GITHUB_REF_NAME#chart-v}"
          branch="${{ github.event.repository.default_branch }}"
          git checkout "$branch"
          sed -i -E "s#(charts/trigix --version )[0-9]+\.[0-9]+\.[0-9]+#\1${version}#g" README.md README.zh.md
          if git diff --quiet; then
            echo "README already references ${version}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md README.zh.md
            git commit -m "docs: bump README Helm install to ${version}"
            git push origin "$branch"
          fi
