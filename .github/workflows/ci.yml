name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (advisory)
        # Advisory for now: the existing codebase has not yet been audited for
        # all Clippy lints. New contributions should aim to keep this clean;
        # tighten to `-D warnings` once the backlog is cleared.
        continue-on-error: true
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  rust-postgres:
    name: Rust (Postgres integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: t
          POSTGRES_PASSWORD: t
          POSTGRES_DB: t
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U t"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Exercises the real Postgres store paths (migrations + type-sensitive SQL)
      # that the in-memory unit tests can't reach. Gated on TEST_DATABASE_URL.
      - name: Postgres integration tests
        env:
          TEST_DATABASE_URL: postgres://t:t@localhost:5432/t
        run: cargo test -p trigix-platform --test postgres_integration

  web:
    name: Web (typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Node SDK tests
        working-directory: sdk/typescript
        run: node --test

  web-e2e:
    name: Web (e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Drives the built SPA in a real browser with the backend mocked, covering
      # browser-only behaviour (captcha widget, attribution) that Rust/unit tests
      # can't reach. The Playwright config builds + previews the app itself.
      - name: Run e2e
        run: npm run e2e

  ai-runtime:
    name: AI Runtime (tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: t
          POSTGRES_PASSWORD: t
          POSTGRES_DB: t
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U t"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/ai-runtime
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Test (unit + pgvector integration)
        env:
          RAG_TEST_DATABASE_URL: postgresql://t:t@localhost:5432/t
        run: python -m pytest -q

      - name: Node SDK tests
        working-directory: sdk/python
        run: |
          pip install -e ".[test]"
          python -m pytest -q

  docker:
    name: Docker (image build smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: trigix-platform:ci
          cache-from: type=gha,scope=platform
          cache-to: type=gha,mode=max,scope=platform

      - name: Build AI runtime image
        uses: docker/build-push-action@v6
        with:
          context: ./services/ai-runtime
          load: true
          tags: trigix-ai-runtime:ci
          cache-from: type=gha,scope=ai-runtime
          cache-to: type=gha,mode=max,scope=ai-runtime

      - name: Smoke - platform binary and nginx present
        run: docker run --rm --entrypoint /bin/sh trigix-platform:ci -c 'command -v trigix-platform && nginx -v'

      - name: Smoke - AI runtime answers /healthz
        run: |
          docker run -d --name airt -p 8000:8000 trigix-ai-runtime:ci
          for _ in $(seq 1 30); do
            curl -fsS http://localhost:8000/healthz && break
            sleep 2
          done
          curl -fsS http://localhost:8000/healthz
          docker rm -f airt

  helm:
    name: Helm (lint, template)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Lint
        run: helm lint charts/trigix

      - name: Template (default + value permutations)
        run: |
          helm template t charts/trigix > /tmp/default.yaml
          helm template t charts/trigix --set executor.enabled=true > /tmp/executor.yaml
          helm template t charts/trigix --set aiRuntime.enabled=false > /tmp/no-ai.yaml
          helm template t charts/trigix --set secrets.databaseUrl=postgres://u:p@h:5432/d > /tmp/extdb.yaml

      - name: Validate manifests against Kubernetes schemas
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -strict -summary -kubernetes-version 1.29.0 \
            /tmp/default.yaml /tmp/executor.yaml /tmp/no-ai.yaml /tmp/extdb.yaml
