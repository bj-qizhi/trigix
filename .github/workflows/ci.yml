name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (advisory)
        # Advisory for now: the existing codebase has not yet been audited for
        # all Clippy lints. New contributions should aim to keep this clean;
        # tighten to `-D warnings` once the backlog is cleared.
        continue-on-error: true
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  web:
    name: Web (typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Node SDK tests
        working-directory: sdk/typescript
        run: node --test

  ai-runtime:
    name: AI Runtime (tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: t
          POSTGRES_PASSWORD: t
          POSTGRES_DB: t
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U t"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/ai-runtime
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Test (unit + pgvector integration)
        env:
          RAG_TEST_DATABASE_URL: postgresql://t:t@localhost:5432/t
        run: python -m pytest -q

      - name: Node SDK tests
        working-directory: sdk/python
        run: |
          pip install -e ".[test]"
          python -m pytest -q
