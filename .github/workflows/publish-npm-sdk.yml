name: Publish npm SDK

# Publishes sdk/typescript to npm when a tag like `ts-sdk-v0.1.0` is pushed.
# One-time setup: add an `NPM_TOKEN` repo secret (an npm automation token) and
# the package is unscoped (trigix-node-sdk), so no npm org is required.

on:
  push:
    tags: ["ts-sdk-v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Test
        run: node --test

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
