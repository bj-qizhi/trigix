services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trigix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-trigix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trigix"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:80"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-trigix}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-trigix}
      DEV_API_KEY: ${API_KEY:-changeme}
      AUTH_REQUIRED: "true"
      RUST_LOG: ${RUST_LOG:-info}
      PORT: "38080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:38080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
