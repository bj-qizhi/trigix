replicaCount: 2

image:
  repository: trigix/platform
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 38080

ingress:
  enabled: true
  className: "nginx"
  host: "trigix.example.com"
  annotations: {}
  tls:
    enabled: false
    secretName: "trigix-tls"

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "2000m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

env:
  AUTH_REQUIRED: "true"
  MAX_CONCURRENT_EXECUTIONS: "100"
  MAX_EXECUTIONS_PER_TENANT: "20"
  EXECUTION_TIMEOUT_SECS: "3600"

secrets:
  databaseUrl: ""
  jwtSecret: ""
  devApiKey: ""
  # Encrypts stored credentials/SSO secrets at rest (AES-256-GCM). Required for a
  # persistent deployment: the platform fails closed (refuses to start) without
  # it. Set a strong, stable value — losing it makes encrypted secrets
  # unrecoverable. For a throwaway/dev install you may instead set
  # allowPlaintextCredentials=true below to accept plaintext-at-rest.
  credentialMasterKey: ""
  smtpHost: ""
  smtpPort: "587"
  smtpUser: ""
  smtpPassword: ""
  smtpFrom: ""
  appBaseUrl: ""

# Explicitly accept plaintext-at-rest for credentials when no
# secrets.credentialMasterKey is set (dev/throwaway installs only). Leave false
# in production — the platform fails closed without a master key.
allowPlaintextCredentials: false

postgresql:
  enabled: true
  image: "pgvector/pgvector:pg16"
  storage: "10Gi"
  username: "trigix"
  database: "trigix"
  # password is set via postgresql-secret; provide here to use a fixed password
  # otherwise a random one is generated at install time
  password: ""

redis:
  enabled: true
  image: "redis:7-alpine"
  storage: "2Gi"

aiRuntime:
  enabled: true
  replicaCount: 1
  image:
    repository: trigix/ai-runtime
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  # Optional extra env for the AI runtime: real embeddings / reranker / Chinese
  # FTS / agent model gateway, e.g. OPENAI_API_KEY, RERANK_BASE_URL, RAG_FTS_CONFIG.
  env: {}

executor:
  enabled: false
  replicaCount: 3
  image:
    repository: trigix/executor
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "4000m"
      memory: "2Gi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 50
    targetCPUUtilizationPercentage: 60

podAnnotations: {}

serviceAccount:
  create: false
  name: ""

nodeSelector: {}

tolerations: []

affinity: {}
