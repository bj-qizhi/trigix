apiVersion: v1
kind: Service
metadata:
  name: {{ include "trigix.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trigix.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "trigix.selectorLabels" . | nindent 4 }}
