apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trigix.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trigix.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if .Values.allowPlaintextCredentials }}
  ALLOW_PLAINTEXT_CREDENTIALS: "true"
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_HOST: {{ printf "%s-postgresql" (include "trigix.fullname" .) | quote }}
  POSTGRES_PORT: "5432"
  POSTGRES_DB: {{ .Values.postgresql.database | quote }}
  POSTGRES_USER: {{ .Values.postgresql.username | quote }}
  {{- end }}
  {{- if .Values.redis.enabled }}
  REDIS_URL: {{ printf "redis://%s-redis:6379" (include "trigix.fullname" .) | quote }}
  {{- end }}
  {{- if .Values.aiRuntime.enabled }}
  AI_RUNTIME_BASE_URL: {{ printf "http://%s-ai-runtime:8000" (include "trigix.fullname" .) | quote }}
  {{- end }}
  {{- if .Values.executor.enabled }}
  EXECUTOR_BASE_URL: {{ printf "http://%s-executor:38081" (include "trigix.fullname" .) | quote }}
  {{- end }}
