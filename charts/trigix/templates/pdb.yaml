apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "trigix.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trigix.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "trigix.selectorLabels" . | nindent 6 }}
