apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aiworkflow.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiworkflow.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_HOST: {{ printf "%s-postgresql" (include "aiworkflow.fullname" .) | quote }}
  POSTGRES_PORT: "5432"
  POSTGRES_DB: {{ .Values.postgresql.database | quote }}
  POSTGRES_USER: {{ .Values.postgresql.username | quote }}
  {{- end }}
  {{- if .Values.redis.enabled }}
  REDIS_URL: {{ printf "redis://%s-redis:6379" (include "aiworkflow.fullname" .) | quote }}
  {{- end }}
  {{- if .Values.executor.enabled }}
  EXECUTOR_BASE_URL: {{ printf "http://%s-executor:38081" (include "aiworkflow.fullname" .) | quote }}
  {{- end }}
