apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aiworkflow.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiworkflow.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.databaseUrl }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  {{- else if .Values.postgresql.enabled }}
  {{- $pgHost := printf "%s-postgresql" (include "aiworkflow.fullname" .) }}
  # NOTE: password is injected at runtime from the postgresql secret; this URL
  # is a template — override with secrets.databaseUrl for a complete DSN.
  DATABASE_URL: {{ printf "postgres://%s@%s:5432/%s" .Values.postgresql.username $pgHost .Values.postgresql.database | b64enc | quote }}
  {{- else }}
  DATABASE_URL: {{ "" | b64enc | quote }}
  {{- end }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  DEV_API_KEY: {{ .Values.secrets.devApiKey | b64enc | quote }}
  SMTP_HOST: {{ .Values.secrets.smtpHost | b64enc | quote }}
  SMTP_PORT: {{ .Values.secrets.smtpPort | b64enc | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | b64enc | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | b64enc | quote }}
  SMTP_FROM: {{ .Values.secrets.smtpFrom | b64enc | quote }}
  APP_BASE_URL: {{ .Values.secrets.appBaseUrl | b64enc | quote }}
