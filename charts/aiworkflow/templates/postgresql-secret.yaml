{{- if .Values.postgresql.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aiworkflow.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiworkflow.labels" . | nindent 4 }}
  annotations:
    # Helm hook ensures this secret is created before dependent resources
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if .Values.postgresql.password }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.password | b64enc | quote }}
  {{- else }}
  # randAlphaNum generates a stable value on first install; use --set to override.
  POSTGRES_PASSWORD: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
