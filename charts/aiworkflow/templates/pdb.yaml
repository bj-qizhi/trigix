apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "aiworkflow.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiworkflow.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "aiworkflow.selectorLabels" . | nindent 6 }}
