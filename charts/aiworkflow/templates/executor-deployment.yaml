{{- if .Values.executor.enabled -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aiworkflow.fullname" . }}-executor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiworkflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  {{- if not .Values.executor.autoscaling.enabled }}
  replicas: {{ .Values.executor.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "aiworkflow.executorSelectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "aiworkflow.executorSelectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: executor
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: 120
      serviceAccountName: {{ include "aiworkflow.serviceAccountName" . }}
      containers:
        - name: executor
          image: "{{ .Values.executor.image.repository }}:{{ .Values.executor.image.tag }}"
          imagePullPolicy: {{ .Values.executor.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 38081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "aiworkflow.fullname" . }}
            - secretRef:
                name: {{ include "aiworkflow.fullname" . }}
          env:
            - name: EXECUTOR_PORT
              value: "38081"
            - name: EXECUTOR_BASE_URL
              value: {{ printf "http://%s-executor:38081" (include "aiworkflow.fullname" .) | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          resources:
            {{- toYaml .Values.executor.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aiworkflow.fullname" . }}-executor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiworkflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  type: ClusterIP
  ports:
    - port: 38081
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aiworkflow.executorSelectorLabels" . | nindent 4 }}
---
{{- if .Values.executor.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "aiworkflow.fullname" . }}-executor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiworkflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "aiworkflow.fullname" . }}-executor
  minReplicas: {{ .Values.executor.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.executor.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.executor.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "aiworkflow.fullname" . }}-executor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiworkflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "aiworkflow.executorSelectorLabels" . | nindent 6 }}
{{- end }}
